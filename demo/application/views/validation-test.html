{% extends 'layout/default.html' %}
{% block title %}Form Validation Test{% endblock %}
{% block content %}
<!--begin::Root-->
<div class="d-flex flex-column flex-root" id="kt_app_root">
  <!--begin::Page-->
  <div class="d-flex flex-column flex-center flex-column-fluid">
    <!--begin::Content-->
    <div class="d-flex flex-column flex-center text-center p-10">
      <!--begin::Wrapper-->
      <div class="card card-flush w-md-650px py-5">
        <div class="card-body py-15 py-lg-20">
          <!--begin::Heading-->
          <div class="text-center mb-11">
            <h1 class="text-dark fw-bolder mb-3">Form Validation Test</h1>
            <p class="text-gray-500 fw-semibold fs-6">Test CodeIgniter 3 form validation rules</p>
          </div>
          <!--end::Heading-->

          <!--begin::Form-->
          <form id="validationTestForm" class="form w-100" novalidate="novalidate">
            <!--begin::Username-->
            <div class="fv-row mb-8 text-start">
              <label class="form-label fw-bolder text-dark fs-6">Username</label>
              <input type="text" placeholder="Enter username" name="username" class="form-control bg-transparent" autocomplete="off" />
              <div class="fv-plugins-message-container invalid-feedback"></div>
            </div>
            <!--end::Username-->

            <!--begin::Email-->
            <div class="fv-row mb-8 text-start">
              <label class="form-label fw-bolder text-dark fs-6">Email</label>
              <input type="email" placeholder="Enter email" name="email" class="form-control bg-transparent" autocomplete="off" />
              <div class="fv-plugins-message-container invalid-feedback"></div>
            </div>
            <!--end::Email-->

            <!--begin::Password-->
            <div class="fv-row mb-8 text-start">
              <label class="form-label fw-bolder text-dark fs-6">Password</label>
              <input type="password" placeholder="Enter password" name="password" class="form-control bg-transparent" autocomplete="off" />
              <div class="fv-plugins-message-container invalid-feedback"></div>
            </div>
            <!--end::Password-->

            <!--begin::Password Confirmation-->
            <div class="fv-row mb-8 text-start">
              <label class="form-label fw-bolder text-dark fs-6">Password Confirmation</label>
              <input type="password" placeholder="Confirm password" name="password_confirm" class="form-control bg-transparent" autocomplete="off" />
              <div class="fv-plugins-message-container invalid-feedback"></div>
            </div>
            <!--end::Password Confirmation-->

            <!--begin::Colors Checkbox-->
            <div class="fv-row mb-8 text-start">
              <label class="form-label fw-bolder text-dark fs-6 mb-3">Favorite Colors (Select at least one)</label>
              <div class="d-flex flex-column">
                <label class="form-check form-check-custom form-check-solid mb-3">
                  <input class="form-check-input" type="checkbox" name="colors[]" value="red" />
                  <span class="form-check-label text-gray-700 fw-semibold">Red</span>
                </label>
                <label class="form-check form-check-custom form-check-solid mb-3">
                  <input class="form-check-input" type="checkbox" name="colors[]" value="blue" />
                  <span class="form-check-label text-gray-700 fw-semibold">Blue</span>
                </label>
                <label class="form-check form-check-custom form-check-solid mb-3">
                  <input class="form-check-input" type="checkbox" name="colors[]" value="green" />
                  <span class="form-check-label text-gray-700 fw-semibold">Green</span>
                </label>
                <label class="form-check form-check-custom form-check-solid">
                  <input class="form-check-input" type="checkbox" name="colors[]" value="yellow" />
                  <span class="form-check-label text-gray-700 fw-semibold">Yellow (Invalid - will cause error)</span>
                </label>
              </div>
              <div class="fv-plugins-message-container invalid-feedback"></div>
            </div>
            <!--end::Colors Checkbox-->

            <!--begin::Submit button-->
            <div class="d-grid mb-10">
              <button type="submit" class="btn btn-primary">
                <span class="indicator-label">Test Validation</span>
                <span class="indicator-progress">Please wait... <span class="spinner-border spinner-border-sm align-middle ms-2"></span></span>
              </button>
            </div>
            <!--end::Submit button-->

            <!--begin::Result-->
            <div id="validationResult" class="alert d-none"></div>
            <!--end::Result-->
          </form>
          <!--end::Form-->

          <!--begin::Back link-->
          <div class="text-center">
            <a href="/users" class="link-primary fw-semibold">Back to Users</a>
          </div>
          <!--end::Back link-->
        </div>
      </div>
      <!--end::Wrapper-->
    </div>
    <!--end::Content-->
  </div>
  <!--end::Page-->
</div>
<!--end::Root-->
{% endblock %}

{% block script %}
<script>
const form = document.getElementById('validationTestForm');
const submitBtn = form.querySelector('button[type="submit"]');
const resultDiv = document.getElementById('validationResult');

form.addEventListener('submit', async (e) => {
  e.preventDefault();

  // Clear previous errors
  form.querySelectorAll('.is-invalid').forEach(el => el.classList.remove('is-invalid'));
  form.querySelectorAll('.invalid-feedback').forEach(el => el.textContent = '');
  resultDiv.classList.add('d-none');

  // Show loading state
  submitBtn.setAttribute('data-kt-indicator', 'on');
  submitBtn.disabled = true;

  try {
    const formData = new FormData(form);
    const response = await fetch('/validation-test/submit', {
      method: 'POST',
      body: formData
    });

    const result = await response.json();

    if (result.success) {
      // Show success message
      resultDiv.className = 'alert alert-success';
      resultDiv.innerHTML = `
        <h4 class="alert-heading">Success!</h4>
        <p>${result.message}</p>
        <hr>
        <pre class="mb-0">${JSON.stringify(result.data, null, 2)}</pre>
      `;
      resultDiv.classList.remove('d-none');

      // Reset form
      form.reset();
    } else {
      // Show validation errors
      for (const [field, error] of Object.entries(result.errors)) {
        if (error) {
          const fieldName = field === 'colors' ? 'colors[]' : field;
          let input = form.querySelector(`[name="${fieldName}"]`);

          if (!input && fieldName === 'colors[]') {
            // For checkbox arrays, find the first checkbox
            input = form.querySelector(`[name="colors[]"]`);
          }

          if (input) {
            input.classList.add('is-invalid');
            const feedback = input.closest('.fv-row').querySelector('.invalid-feedback');
            if (feedback) {
              feedback.innerHTML = error;
            }
          }
        }
      }

      resultDiv.className = 'alert alert-danger';
      resultDiv.textContent = 'Please correct the errors above.';
      resultDiv.classList.remove('d-none');
    }
  } catch (error) {
    console.error('Error:', error);
    resultDiv.className = 'alert alert-danger';
    resultDiv.textContent = 'An error occurred. Please try again.';
    resultDiv.classList.remove('d-none');
  } finally {
    // Hide loading state
    submitBtn.removeAttribute('data-kt-indicator');
    submitBtn.disabled = false;
  }
});
</script>
{% endblock %}
